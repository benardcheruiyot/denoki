# InterServer Nginx reverse proxy for extramkopo.mkopaji.com
# Frontend static files + Node API proxy + SSL

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    server_name extramkopo.mkopaji.com www.extramkopo.mkopaji.com;
    return 301 https://$host$request_uri;
}

# HTTPS main server
server {
    listen 443 ssl http2;
    server_name extramkopo.mkopaji.com www.extramkopo.mkopaji.com;

    # --- SSL certificates (Let's Encrypt / InterServer) ---
    # Replace these paths with the actual paths on your InterServer account.
    ssl_certificate     /etc/letsencrypt/live/extramkopo.mkopaji.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/extramkopo.mkopaji.com/privkey.pem;

    # Recommended TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Replace with your real frontend path on InterServer
    root /var/www/extramkopo.mkopaji.com/frontend;
    index index.html;

    # Main frontend (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Folder-style sub-routes
    location /apply {
        try_files $uri $uri/ /apply/index.html;
    }

    location /eligibility {
        try_files $uri $uri/ /eligibility/index.html;
    }

    # Reverse proxy all /api traffic to the Node backend
    location /api/ {
        proxy_pass http://127.0.0.1:1000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;
    }

    client_max_body_size 10m;
}
