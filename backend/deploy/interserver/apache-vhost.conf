# InterServer Apache reverse proxy vhost for extramkopo.mkopaji.com
# Requires modules: proxy proxy_http headers rewrite

<VirtualHost *:80>
    ServerName extramkopo.mkopaji.com
    ServerAlias www.extramkopo.mkopaji.com

    # Replace with your real frontend path on InterServer
    DocumentRoot /var/www/extramkopo.mkopaji.com/frontend

    ProxyPreserveHost On
    ProxyRequests Off

    # Pass API routes to Node app
    ProxyPass /api http://127.0.0.1:1000/api
    ProxyPassReverse /api http://127.0.0.1:1000/api

    RequestHeader set X-Forwarded-Proto "http"

    <Directory /var/www/extramkopo.mkopaji.com/frontend>
        AllowOverride All
        Require all granted
    </Directory>

    RewriteEngine On

    # Do not rewrite API routes
    RewriteCond %{REQUEST_URI} !^/api/

    # Serve existing files/directories directly
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d

    # SPA fallback
    RewriteRule ^ /index.html [L]

    ErrorLog ${APACHE_LOG_DIR}/extramkopo_error.log
    CustomLog ${APACHE_LOG_DIR}/extramkopo_access.log combined
</VirtualHost>
